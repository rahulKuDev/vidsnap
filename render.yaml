services:
  - type: web
    name: vidsnap-api
    runtime: docker
    plan: starter
    dockerfilePath: ./artifacts/api-server/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    disk:
      name: vidsnap-data
      mountPath: /app/persist
      sizeGB: 5
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: LOG_LEVEL
        value: info
      - key: JWT_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DB_DIR
        value: /app/persist/data
      - key: DOWNLOADS_DIR
        value: /app/persist/downloads
      - key: UPLOADS_DIR
        value: /app/persist/uploads
      - key: YTDLP_PATH
        value: /usr/local/bin/yt-dlp
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM_NAME
        value: VidSnap
